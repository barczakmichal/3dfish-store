    <circle cx="100" cy="80" r="4" fill="rgba(255,255,255,0.15)"/>
    <!-- Hooks -->
    <path d="M20,20 L20,40 C20,45 25,45 25,40" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <path d="M80,50 L80,70 C80,75 85,75 85,70" stroke="#fbbf24" stroke-width="2" fill="none"/>
    <rect x="45" y="48" width="12" height="8" rx="2" fill="rgba(249,115,22,0.3)" stroke="#f97316" stroke-width="1.5"/>
  </g>
  <text x="300" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Panel Organizacyjny</text>
  <text x="300" y="460" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#f97316">na Sprzet</text>
  <text x="300" y="510" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="3">3DFISH</text>
