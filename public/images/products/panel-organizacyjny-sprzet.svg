<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <circle cx="300" cy="250" r="120" fill="rgba(255,255,255,0.08)"/>
  <!-- Pegboard panel icon -->
  <g transform="translate(240,190)">
    <rect x="0" y="0" width="120" height="100" rx="6" fill="rgba(255,255,255,0.08)" stroke="#f97316" stroke-width="2.5"/>
    <!-- Peg holes grid -->
    <circle cx="20" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="50" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="100" cy="20" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="20" cy="50" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="50" cy="50" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="80" cy="50" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="100" cy="50" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="20" cy="80" r="4" fill="rgba(255,255,255,0.15)"/>
    <circle cx="50" cy="80" r="4" fill="rgba(255,255,255,0.15)"/>
